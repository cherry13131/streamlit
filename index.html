<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 자원 모니터링 시스템</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 상단 배너 -->

    <section class="hero">

        <img src="school.jpg" alt="학교 이미지">

        <div class="hero-overlay">

            <h1>학교 자원 모니터링 시스템</h1>

            <p>
                학교의 전기, 수도, 가스 사용량을 실시간으로 분석하여
                효율적인 자원 관리를 지원하는 플랫폼입니다.
            </p>

        </div>

    </section>

    <div class="container">

        <!-- 원형 그래프 -->

        <section class="analysis-section">

            <div class="progress-wrapper">

                <div class="progress-card">

                    <div class="progress-title">
                        전기
                    </div>

                    <div class="circle blue">
                        <span>78%</span>
                    </div>

                </div>

                <div class="progress-card">

                    <div class="progress-title">
                        수도
                    </div>

                    <div class="circle green">
                        <span>91%</span>
                    </div>

                </div>

                <div class="progress-card">

                    <div class="progress-title">
                        가스
                    </div>

                    <div class="circle orange">
                        <span>85%</span>
                    </div>

                </div>

            </div>

        </section>

        <!-- 에코 트리 모니터링 섹션 -->
        <section class="eco-tree-section">
            <div class="eco-tree-layout">
                <!-- 왼쪽: 제목 및 글씨 -->
                <div class="eco-tree-text-area">
                    <h2>자원 절약<br>친환경 기여도</h2>
                    <p class="description">
                        학교의 월간 전기, 수도, 가스 총 지출 비용을 
                        친환경 나무 식재 기여도로 환산한 에코 그래프입니다.<br><br>
                        여러분의 절약이 얼마나 많은 나무를 
                        심을 수 있는지 확인해보세요.
                    </p>
                    <div class="eco-stats">
                        <div class="stat-box">
                            <span class="stat-label">총 자원 지출액</span>
                            <span class="stat-value highlight-yellow">280,000 원</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">연간 CO₂ 흡수 기여</span>
                            <span class="stat-value highlight-green">184.8 kg</span>
                        </div>
                    </div>
                </div>

                <!-- 오른쪽: 나무 그래프 -->
                <div class="eco-tree-graphic-area">
                    <svg id="single-tree-svg" viewBox="70 60 360 430" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#84cc16" />
                                <stop offset="100%" stop-color="#4d7c0f" />
                            </linearGradient>
                            <linearGradient id="liquidGradBack" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#a3e635" />
                                <stop offset="100%" stop-color="#65a30d" />
                            </linearGradient>

                            <linearGradient id="outlineGrad" x1="0" y1="90" x2="0" y2="460" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#65a30d" />
                                <stop offset="100%" stop-color="#3f6212" />
                            </linearGradient>

                            <clipPath id="clip-canopy">
                                <path d="M 250,350 A 60 60 0 0 1 150,290 A 65 65 0 0 1 160,190 A 100 100 0 0 1 340,190 A 65 65 0 0 1 350,290 A 60 60 0 0 1 250,350 Z" />
                            </clipPath>

                            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                                <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.08" />
                            </filter>
                        </defs>

                        <!-- Canopy Background -->
                        <path d="M 250,350 A 60 60 0 0 1 150,290 A 65 65 0 0 1 160,190 A 100 100 0 0 1 340,190 A 65 65 0 0 1 350,290 A 60 60 0 0 1 250,350 Z" fill="#ffffff" filter="url(#softShadow)" />

                        <!-- Liquid Fill Area -->
                        <g clip-path="url(#clip-canopy)">
                            <!-- Inner soft background -->
                            <rect x="0" y="0" width="500" height="550" fill="#f4fce3" />
                            
                            <!-- Wave container -->
                            <g class="wave-container" transform="translate(0, 190)">
                                <!-- Wave Back -->
                                <path class="wave-path wave-back" d="M -100,0 C 25,-20 125,20 250,0 C 375,-20 475,20 600,0 C 725,-20 825,20 950,0 V 550 H -100 Z" fill="url(#liquidGradBack)" opacity="0.7" />
                                <!-- Wave Front -->
                                <path class="wave-path wave-front" d="M -100,0 C 25,20 125,-20 250,0 C 375,20 475,-20 600,0 C 725,-20 825,20 950,0 V 550 H -100 Z" fill="url(#liquidGrad)" />
                            </g>
                        </g>

                        <!-- Base -->
                        <path d="M 190,460 L 310,460" fill="none" stroke="url(#outlineGrad)" stroke-width="16" stroke-linecap="round" />
                        
                        <!-- Trunk and Branches (Shortened) -->
                        <path d="M 250,460 L 250,330 L 215,295 M 250,330 L 285,295" fill="none" stroke="url(#outlineGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

                        <!-- Canopy Border -->
                        <path d="M 250,350 A 60 60 0 0 1 150,290 A 65 65 0 0 1 160,190 A 100 100 0 0 1 340,190 A 65 65 0 0 1 350,290 A 60 60 0 0 1 250,350 Z" fill="none" stroke="url(#outlineGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

                        <!-- Text inside Canopy -->
                        <text x="250" y="240" class="tree-text-num" text-anchor="middle">28그루</text>
                        <text x="250" y="285" class="tree-text-desc" text-anchor="middle">에코 기여도</text>
                    </svg>
                </div>
            </div>
        </section>

        <!-- 카드 -->

        <section class="card-section">

            <div class="card-grid">

                <div class="info-card"
                     onclick="location.href='electricity.html'">

                    <h3>전기</h3>

                </div>

                <div class="info-card"
                     onclick="location.href='water.html'">

                    <h3>수도</h3>

                </div>

                <div class="info-card"
                     onclick="location.href='gas.html'">

                    <h3>가스</h3>

                </div>

            </div>

        </section>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수도 사용량 모니터링 - 학교 자원 모니터링</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="dashboard-container">

        <div class="page-header">
            <div>
                <h1>💧 수도 사용량 모니터링</h1>
                <p>실시간 수도 사용 현황 대시보드</p>
            </div>
            <a href="index.html" class="back-btn">← 메인으로</a>
        </div>

        <div class="top-cards">
            <div class="card">
                <div class="icon-box green"><i class="fas fa-tint"></i></div>
                <div class="card-info">
                    <h3>현재 수도 사용량</h3>
                    <div class="value green-text">781 <span>L</span></div>
                    <div class="sub-text gray-text"><span class="dot green"></span> 안정적인 사용량 유지 중</div>
                </div>
            </div>

            <div class="card">
                <div class="icon-box teal"><i class="fas fa-chart-line"></i></div>
                <div class="card-info">
                    <h3>오늘 누적 사용량</h3>
                    <div class="value teal-text">5,120 <span>L</span></div>
                    <div class="sub-text gray-text"><span class="dot green"></span> 전일 대비 -3%</div>
                </div>
            </div>

            <div class="card">
                <div class="icon-box green"><i class="fas fa-leaf"></i></div>
                <div class="card-info">
                    <h3>절약 효율</h3>
                    <div class="value green-text">91 <span>%</span></div>
                    <div class="sub-text gray-text"><i class="far fa-calendar-check"></i> 이번 주 기준</div>
                </div>
            </div>
        </div>

        <div class="bottom-sections">
            <div class="chart-card">
                <h3>수도 상태 분석</h3>
                <div class="donut-container">
                    <div class="donut-item">
                        <h4>사용률</h4>
                        <div class="chart-wrapper">
                            <canvas id="waterDonut"></canvas>
                            <div class="center-text">
                                <strong>91%</strong>
                                <span>상태 매우 양호</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="line-chart-box">
                <div class="line-header">
                    <h3>수도 사용량 추이 <span>(L)</span></h3>
                    <div class="badge"><span class="dot green"></span> 실시간</div>
                </div>
                <div class="canvas-container">
                    <canvas id="waterLine"></canvas>
                </div>
            </div>
        </div>

    </div>

    <footer>
        <p>© 2026 학교 자원 모니터링 시스템. All rights reserved.</p>
    </footer>

    <script>
        Chart.defaults.font.family = "'Noto Sans KR', sans-serif";

        // 도넛 차트
        new Chart(document.getElementById('waterDonut').getContext('2d'), {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [91, 9],
                    backgroundColor: ['#7dc242', '#eff7e9'],
                    borderWidth: 0,
                    borderRadius: 10
                }]
            },
            options: {
                cutout: '80%',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { tooltip: { enabled: false } }
            }
        });

        // 라인 차트
        const ctx = document.getElementById('waterLine').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 180);
        gradient.addColorStop(0, 'rgba(125, 194, 66, 0.2)');
        gradient.addColorStop(1, 'rgba(125, 194, 66, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '24:00'],
                datasets: [{
                    data: [450, 650, 920, 780, 750, 700, 520],
                    borderColor: '#7dc242',
                    backgroundColor: gradient,
                    fill: true,
                    pointBorderColor: '#7dc242',
                    pointBackgroundColor: '#fff',
                    pointBorderWidth: 2,
                    tension: 0.4,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 11 } } },
                    y: { min: 0, max: 1000, grid: { color: '#f3f4f6' }, ticks: { color: '#9ca3af', stepSize: 250 } }
                },
                elements: { point: { radius: 3 } }
            }
        });
    </script>

</body>
</html>
